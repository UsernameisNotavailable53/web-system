
<style>
  .order-wrap { padding: 1.5rem 0; max-width: 560px; margin: 0 auto; }
  .order-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.5rem; }
  .product-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
  .product-icon { width: 44px; height: 44px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; color: var(--color-text-secondary); flex-shrink: 0; }
  .product-name { font-size: 16px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .qty-controls { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 32px; height: 32px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; line-height: 1; padding: 0; }
  .qty-btn:hover { background: var(--color-background-secondary); }
  .qty-btn:active { transform: scale(0.95); }
  .qty-input { width: 48px; height: 32px; text-align: center; font-size: 15px; font-weight: 500; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: text; }
  .qty-input:focus { outline: none; border-color: var(--color-border-primary); background: var(--color-background-primary); }
  .reset-btn { width: 32px; height: 32px; border: none; background: transparent; color: var(--color-text-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: var(--border-radius-md); transition: color 0.15s, background 0.15s; padding: 0; }
  .reset-btn:hover { color: var(--color-text-danger); background: var(--color-background-danger); }
  .summary-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem 1.25rem; margin-top: 1.5rem; }
  .summary-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--color-text-secondary); padding: 2px 0; }
  .summary-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 500; color: var(--color-text-primary); padding-top: 10px; margin-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }
  .order-btn { margin-top: 1rem; width: 100%; height: 44px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .order-btn:hover { opacity: 0.85; }
  .order-btn:active { transform: scale(0.99); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--color-text-primary); color: var(--color-background-primary); padding: 10px 20px; border-radius: var(--border-radius-md); font-size: 14px; transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>

<div class="order-wrap">
  <h2 class="sr-only">商品注文システム</h2>
  <p class="order-title"><i class="ti ti-shopping-cart" aria-hidden="true" style="margin-right:8px;font-size:20px;vertical-align:-2px;"></i>注文システム</p>

  <div id="products"></div>

  <div class="summary-card">
    <div class="summary-row" id="sum-a"><span>商品A</span><span>0 点</span></div>
    <div class="summary-row" id="sum-b"><span>商品B</span><span>0 点</span></div>
    <div class="summary-row" id="sum-c"><span>商品C</span><span>0 点</span></div>
    <div class="summary-total"><span>合計</span><span id="total-qty">0 点</span></div>
  </div>

  <button class="order-btn" onclick="placeOrder()">
    <i class="ti ti-check" aria-hidden="true" style="margin-right:6px;"></i>注文する
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id: 'a', name: '商品A', icon: 'A' },
  { id: 'b', name: '商品B', icon: 'B' },
  { id: 'c', name: '商品C', icon: 'C' },
];
const qtys = { a: 0, b: 0, c: 0 };

function clamp(v) { return Math.max(0, Math.round(v)); }

function render() {
  const container = document.getElementById('products');
  container.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-icon">${p.icon}</div>
      <span class="product-name">${p.name}</span>
      <div class="qty-controls">
        <button class="qty-btn" onclick="change('${p.id}',-1)" aria-label="${p.name}を減らす"><i class="ti ti-minus" style="font-size:14px;"></i></button>
        <input class="qty-input" type="number" min="0" value="${qtys[p.id]}"
          onchange="setVal('${p.id}', this.value)"
          oninput="setVal('${p.id}', this.value)"
          aria-label="${p.name}の数量" />
        <button class="qty-btn" onclick="change('${p.id}',1)" aria-label="${p.name}を増やす"><i class="ti ti-plus" style="font-size:14px;"></i></button>
        <button class="reset-btn" onclick="reset('${p.id}')" aria-label="${p.name}をリセット"><i class="ti ti-refresh" style="font-size:16px;"></i></button>
      </div>
    </div>
  `).join('');
  updateSummary();
}

function updateSummary() {
  products.forEach(p => {
    document.getElementById('sum-' + p.id).innerHTML =
      `<span>${p.name}</span><span>${qtys[p.id]} 点</span>`;
  });
  const total = Object.values(qtys).reduce((s, v) => s + v, 0);
  document.getElementById('total-qty').textContent = total + ' 点';
}

function change(id, delta) {
  qtys[id] = clamp(qtys[id] + delta);
  render();
}

function setVal(id, val) {
  const n = parseInt(val, 10);
  qtys[id] = isNaN(n) ? 0 : clamp(n);
  updateSummary();
}

function reset(id) {
  qtys[id] = 0;
  render();
}

function placeOrder() {
  const total = Object.values(qtys).reduce((s, v) => s + v, 0);
  if (total === 0) {
    showToast('商品を選択してください');
    return;
  }
  const lines = products.filter(p => qtys[p.id] > 0).map(p => `${p.name} × ${qtys[p.id]}`).join('、');
  showToast('注文しました：' + lines);
  products.forEach(p => qtys[p.id] = 0);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

render();
</script>
