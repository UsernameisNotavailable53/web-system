<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本部用 | 文化祭 販売管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="hq">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Headquarters Site</p>
          <h1>本部ダッシュボード</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button hidden" type="button" id="logoutButton">ログアウト</button>
          <button class="ghost-button danger" type="button" id="clearHistoryButton">履歴クリア</button>
        </div>
      </header>

      <main>
        <section aria-labelledby="hqTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Summary</p>
              <h2 id="hqTitle">売上・金券集計</h2>
            </div>
          </div>

          <section class="auth-panel" id="authPanel">
            <h3>Firebaseログイン</h3>
            <form class="login-form" id="authForm">
              <label>
                <span>メールアドレス</span>
                <input id="authEmail" type="email" autocomplete="username" />
              </label>
              <label>
                <span>パスワード</span>
                <input id="authPassword" type="password" autocomplete="current-password" />
              </label>
              <button class="primary-button" type="submit">ログイン</button>
            </form>
            <p class="status-text" id="authMessage"></p>
          </section>

          <section class="login-panel hidden" id="hqLogin">
            <h3>本部認証</h3>
            <form id="hqLoginForm" class="login-form">
              <label>
                <span>パスワード</span>
                <input id="hqPassword" type="password" autocomplete="current-password" />
              </label>
              <button class="primary-button" type="submit">ログイン</button>
            </form>
            <p class="status-text" id="loginMessage"></p>
          </section>

          <div class="dashboard hidden" id="dashboard">
            <section class="metric-grid" aria-label="集計">
              <article class="metric-card">
                <span>総売上</span>
                <strong id="metricSales">0円</strong>
              </article>
              <article class="metric-card">
                <span>注文数</span>
                <strong id="metricOrders">0</strong>
              </article>
              <article class="metric-card">
                <span>金券合計</span>
                <strong id="metricTickets">0円</strong>
              </article>
            </section>

            <div class="dashboard-grid">
              <section class="report-panel">
                <h3>部門別売上</h3>
                <div id="departmentSummary" class="summary-table"></div>
              </section>
              <section class="report-panel">
                <h3>金券集計</h3>
                <div id="ticketSummary" class="summary-table"></div>
              </section>
            </div>

            <section class="report-panel">
              <div class="panel-title-row">
                <h3>注文履歴</h3>
                <span id="historyCount">0件</span>
              </div>
              <div class="history-list" id="historyList"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
